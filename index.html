<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Hotel - Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<header>
    <h1><i class="fas fa-user-shield"></i> Kingdom Hotel Admin Dashboard</h1>
</header>

<div class="container">
    <div class="stats">
        <div class="card">
            <h3>Total Bookings (ጠቕላላ ምዝገባ)</h3>
            <p id="totalCount">0</p>
        </div>
        <div class="card">
            <h3>Pending (ዝጻረ ዘሎ)</h3>
            <p id="pendingCount" style="color: orange;">0</p>
        </div>
        <div class="card">
            <h3>Revenue (እቶት)</h3>
            <p id="revenue">0 ETB</p>
        </div>
    </div>
    <div style="margin-top: 20px;">
        <button onclick="fetchAllBookings()" class="btn view-receipt"><i class="fas fa-sync"></i> Refresh Data</button>
    </div>

    <div class="card" style="margin-top: 20px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap;">
        <div>
          <label>ካብ (Start)➡</label>
            <input type="date" id="startDate" style="padding: 8px; border-radius: 5px; border: 1px solid black;">
        </div>
        <div>
            <label>ክሳብ (End)➡</label>
            <input type="date" id="endDate" style="padding: 8px; border-radius: 5px; border: 1px solid black;">
        </div>
        <button onclick="filterByDate()" class="btn view-receipt" style="margin-top: 5px;">ሪፖርት ኣውጽእ</button>
    </div>

    <div style="margin: 15px 0;">
        <input type="text" id="searchInput" onkeyup="filterBookings()" placeholder="ብሽም፡ ስልኪ ወይ ዓይነት ክፍሊ ፈልግ..." 
               style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;">
    </div>
    <table>
        <thead>
            <tr>
                <th>ዓሚል (Name)</th>
                <th>ክፍሊ (Room)</th>
                <th>phone (ስልኪ)</th>
                <th>መእተዊ/መውጽኢ (Dates)</th>
                <th>ሪሲት</th>
                <th>Status</th>
                <th>ተግባር (Action)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>
</div>
    <div class="card" style="margin-top: 30px; text-align: center; border: 2px solid var(--gold); padding: 25px; border-radius: 10px;">
        <h3 style="color: var(--dark-blue); margin-bottom: 15px;">
            <i class="fas fa-qrcode"></i> Kingdom Hotel Booking QR
        </h3>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://kidaneweldat20-coder.github.io/kingdom/rooms.html&color=B8860B" 
             alt="Booking QR Code" 
             style="border: 5px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border-radius: 10px;">
        <p style="margin-top: 15px; color: #555; font-weight: bold;">
            ዓማዊል ነዚ ስካን ብምግባር ብቐጥታ ክምዝገቡ ይኽእሉ እዮም።
        </p>
        <div style="margin-top: 15px;">
            <button onclick="window.open('https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https://kidaneweldat20-coder.github.io/kingdom/rooms.html&color=B8860B', '_blank')" 
                    class="print">
                <i class="fas fa-download"></i> ንምሕታም ኣዕብዮ (High Quality)
            </button>
        </div>
    </div>
<script src="admin.js"></script>
</body>
</html>
